<svg xmlns="http://www.w3.org/2000/svg" width="560" height="140" viewBox="0 0 560 140" role="img" aria-labelledby="title desc">
  <title id="title">Battletoads Shop header logo</title>
  <desc id="desc">Battletoads Shop logo with the last T replaced by a centered syringe, and shop below in spaced lowercase.</desc>

  <defs>
    <linearGradient id="greenText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7bf202"/>
      <stop offset="100%" stop-color="#7bf202"/>
    </linearGradient>
    <linearGradient id="shopBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CB9FF"/>
      <stop offset="100%" stop-color="#5B8FF7"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8BC79"/>
      <stop offset="100%" stop-color="#C39A49"/>
    </linearGradient>
  </defs>

  <rect width="560" height="140" fill="transparent"/>

  <g>
    <text x="36" y="72"
          font-family="Arial Narrow, Bahnschrift, Inter, Arial, Helvetica, sans-serif"
          font-size="68"
          font-style="italic"
          font-weight="800"
          letter-spacing="-3"
          fill="url(#greenText)"
          stroke="#24303A"
          stroke-width="1.5"
          paint-order="stroke fill">BATTLE</text>

    <text x="338" y="72"
          font-family="Arial Narrow, Bahnschrift, Inter, Arial, Helvetica, sans-serif"
          font-size="68"
          font-style="italic"
          font-weight="800"
          letter-spacing="-3"
          fill="url(#greenText)"
          stroke="#24303A"
          stroke-width="1.5"
          paint-order="stroke fill">OADS</text>

    <!-- syringe moved to the right so it actually occupies the final T position -->
    <g transform="translate(332,22) rotate(33)">
      <line x1="0" y1="78" x2="0" y2="115" stroke="#222B35" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="-5.5" y="70" width="11" height="10" rx="1.5" fill="#222B35"/>
      <rect x="-14" y="16" width="28" height="56" rx="3" fill="#F8FAFC" stroke="#222B35" stroke-width="2.2"/>
      <rect x="-8.5" y="40" width="17" height="27" rx="1" fill="url(#liquid)"/>
      <line x1="0" y1="20" x2="0" y2="34" stroke="#67727E" stroke-width="1.5"/>
      <line x1="-7" y1="27" x2="-2" y2="27" stroke="#67727E" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="-7" y1="35" x2="-2" y2="35" stroke="#67727E" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="-7" y1="43" x2="-2" y2="43" stroke="#67727E" stroke-width="1.4" stroke-linecap="round"/>
      <rect x="-5.5" y="8" width="11" height="8" rx="1.5" fill="#222B35"/>
      <line x1="0" y1="-10" x2="0" y2="8" stroke="#222B35" stroke-width="2.2" stroke-linecap="round"/>
      <rect x="-16" y="-15" width="32" height="6" rx="1.5" fill="#222B35"/>
      <line x1="-18" y1="14" x2="18" y2="14" stroke="#222B35" stroke-width="2.2" stroke-linecap="round"/>
    </g>
  </g>

  <text x="118" y="115"
        font-family="Arial Narrow, Bahnschrift, Inter, Arial, Helvetica, sans-serif"
        font-size="25"
        font-style="italic"
        font-weight="700"
        letter-spacing="9"
        fill="url(#shopBlue)">shop</text>
</svg>