<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="250" viewBox="0 0 1100 250" fill="none">
  <defs>
    <linearGradient id="battleGrad" x1="40" y1="40" x2="540" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#89F51A"/>
      <stop offset="1" stop-color="#7BF202"/>
    </linearGradient>
    <linearGradient id="shopGrad" x1="40" y1="155" x2="190" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74ACFF"/>
      <stop offset="1" stop-color="#4A8EF2"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="1100" height="250" fill="transparent"/>

  <!-- Main wordmark -->
  <g filter="url(#softGlow)">
    <text x="38" y="122"
          font-family="Arial Black, Inter, Arial, Helvetica, sans-serif"
          font-size="98"
          font-style="italic"
          font-weight="900"
          letter-spacing="-3"
          fill="url(#battleGrad)">BATTLETOADS</text>

    <text x="44" y="192"
          font-family="Arial Black, Inter, Arial, Helvetica, sans-serif"
          font-size="41"
          font-style="italic"
          font-weight="900"
          letter-spacing="14"
          fill="url(#shopGrad)">SHOP</text>
  </g>

  <!-- Molecule accent -->
  <g transform="translate(875,58)" stroke="#4A8EF2" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- main hexagon -->
    <polygon points="28,0 56,16 56,48 28,64 0,48 0,16"/>
    <!-- link to second ring -->
    <line x1="56" y1="16" x2="84" y2="8"/>
    <circle cx="84" cy="8" r="5.5" fill="#4A8EF2" stroke="none"/>
    <!-- left node -->
    <line x1="-22" y1="32" x2="0" y2="32"/>
    <circle cx="-22" cy="32" r="5.5" fill="#4A8EF2" stroke="none"/>
    <!-- small ring branch -->
    <line x1="56" y1="48" x2="80" y2="62"/>
    <polygon points="102,54 118,63 118,81 102,90 86,81 86,63" stroke-width="4.5"/>
    <line x1="80" y1="62" x2="86" y2="63"/>
    <!-- tiny terminal node -->
    <line x1="118" y1="72" x2="136" y2="72"/>
    <circle cx="136" cy="72" r="4.5" fill="#4A8EF2" stroke="none"/>
  </g>
</svg>
