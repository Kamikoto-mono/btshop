<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="greenGrad" x1="10" y1="18" x2="56" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#95FF31"/>
      <stop offset="1" stop-color="#7BF202"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="54" y1="14" x2="100" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#79B0FF"/>
      <stop offset="1" stop-color="#4189F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.8" flood-color="#1C3557" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="128" height="128" fill="transparent"/>

  <g filter="url(#shadow)">
    <text x="8" y="96"
      font-family="Arial Black, Inter, Arial, Helvetica, sans-serif"
      font-size="82"
      font-style="italic"
      font-weight="900"
      letter-spacing="-8"
      fill="url(#greenGrad)"
      stroke="#223755"
      stroke-width="3.2"
      paint-order="stroke fill">B</text>

    <text x="52" y="96"
      font-family="Arial Black, Inter, Arial, Helvetica, sans-serif"
      font-size="82"
      font-style="italic"
      font-weight="900"
      letter-spacing="-6"
      fill="url(#blueGrad)"
      stroke="#223755"
      stroke-width="3.2"
      paint-order="stroke fill">T</text>
  </g>

  <!-- compact molecule accent -->
  <g transform="translate(82 14)" stroke="#5A94F2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.98">
    <polygon points="10,0 20,6 20,18 10,24 0,18 0,6"/>
    <line x1="20" y1="6" x2="29" y2="6"/>
    <circle cx="29" cy="6" r="3" fill="#5A94F2" stroke="none"/>
    <line x1="0" y1="18" x2="-6" y2="23"/>
    <circle cx="-6" cy="23" r="3" fill="#7BF202" stroke="none"/>
  </g>
</svg>
