services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: web
    container_name: btshop-web
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3001:3000"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: admin
    container_name: btshop-admin
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3002:3000"
    restart: unless-stopped
